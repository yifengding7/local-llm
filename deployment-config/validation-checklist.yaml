# AI监理系统 v2.1 验证清单
# 部署验证和测试的完整清单
# 确保100%功能正常和性能达标

metadata:
  name: "validation-checklist"
  version: "1.0.0"
  description: "AI监理系统v2.1完整验证清单"
  total_checks: 85
  critical_checks: 25
  created_date: "2025-01-17"

# 预部署验证
pre_deployment_validation:
  environment_checks:
    - id: "ENV-001"
      category: "environment"
      priority: "critical"
      name: "系统环境检查"
      description: "验证Apple M3 Max硬件和macOS系统"
      command: "uname -m && sw_vers"
      expected: "arm64 && macOS 14.0+"
      status: "pending"
      
    - id: "ENV-002"
      category: "environment"
      priority: "critical"
      name: "Nix环境验证"
      description: "验证Nix包管理器和flake支持"
      command: "nix --version && nix flake --help"
      expected: "nix 2.18+ && flake subcommand available"
      status: "pending"
      
    - id: "ENV-003"
      category: "environment"
      priority: "high"
      name: "direnv集成检查"
      description: "验证direnv自动环境切换"
      command: "direnv --version && which direnv"
      expected: "direnv 2.32+ installed"
      status: "pending"
      
  dependency_checks:
    - id: "DEP-001"
      category: "dependencies"
      priority: "critical"
      name: "Python版本验证"
      description: "确保Python 3.13环境"
      command: "python3 --version"
      expected: "Python 3.13.x"
      status: "pending"
      
    - id: "DEP-002"
      category: "dependencies"
      priority: "critical"
      name: "FastAPI版本验证"
      description: "确保FastAPI 0.116.1+"
      command: "pip show fastapi | grep Version"
      expected: "Version: 0.116.1"
      status: "pending"
      
    - id: "DEP-003"
      category: "dependencies"
      priority: "critical"
      name: "Pydantic版本验证"
      description: "确保Pydantic 2.11.7+"
      command: "pip show pydantic | grep Version"
      expected: "Version: 2.11.7"
      status: "pending"
      
    - id: "DEP-004"
      category: "dependencies"
      priority: "critical"
      name: "Ollama安装验证"
      description: "确保Ollama 0.3.0+可用"
      command: "ollama --version"
      expected: "ollama version 0.3.0"
      status: "pending"
      
    - id: "DEP-005"
      category: "dependencies"
      priority: "high"
      name: "Rust工具链验证"
      description: "确保Rust 1.79.0+可用"
      command: "rustc --version"
      expected: "rustc 1.79.0"
      status: "pending"
      
    - id: "DEP-006"
      category: "dependencies"
      priority: "high"
      name: "Go工具链验证"
      description: "确保Go 1.22+可用"
      command: "go version"
      expected: "go version go1.22"
      status: "pending"

