          type: "file_exists"
          required: true
        - path: "api/router.py"
          type: "file_exists"
          required: true
        - path: "api/monitor_agent.py"
          type: "file_exists"
          required: true
        - path: "api/auth/jwt_handler.py"
          type: "file_exists"
          required: true
      status: "pending"
      
    - id: "ARCH-003"
      category: "architecture"
      priority: "critical"
      name: "核心引擎层验证"
      description: "验证核心引擎层组件"
      checks:
