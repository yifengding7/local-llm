      category: "ai_models"
      priority: "critical"
      name: "Ollama服务验证"
      description: "验证Ollama服务运行状态"
      command: "curl -f http://localhost:11434/api/tags"
      expected: "JSON response with models list"
      timeout: "10s"
      status: "pending"
      
    - id: "MODEL-002"
      category: "ai_models"
      priority: "critical"
      name: "phi3-mini模型验证"
      description: "验证phi3-mini模型可用性"
      command: "ollama list | grep phi3-mini"
      expected: "phi3-mini model present"
      status: "pending"
      
    - id: "MODEL-003"
      category: "ai_models"
      priority: "critical"
      name: "qwen:8b模型验证"
      description: "验证qwen:8b模型可用性"
      command: "ollama list | grep qwen:8b"
      expected: "qwen:8b model present"
      status: "pending"
      
    - id: "MODEL-004"
      category: "ai_models"
      priority: "critical"
      name: "deepseek-coder模型验证"
      description: "验证deepseek-coder模型可用性"
      command: "ollama list | grep deepseek-coder"
      expected: "deepseek-coder model present"
      status: "pending"
      
  vector_engine_checks:
    - id: "VECTOR-001"
      category: "vector_engine"
      priority: "critical"
      name: "Weaviate服务验证"
      description: "验证Weaviate向量数据库服务"
      command: "curl -f http://localhost:8080/v1/meta"
      expected: "Weaviate metadata response"
      timeout: "10s"
      status: "pending"
      
    - id: "VECTOR-002"
      category: "vector_engine"
      priority: "high"
      name: "向量检索性能测试"
      description: "测试向量检索延迟<50ms"
      command: "python3 -c \"import time; import requests; start=time.time(); requests.get('http://localhost:8080/v1/objects'); print(f'Latency: {(time.time()-start)*1000:.2f}ms')\""
      expected: "Latency < 50ms"
