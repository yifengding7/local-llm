# 验证脚本
validation_scripts:
  setup_script: |
    #!/bin/bash
    echo "设置验证环境..."
    
    # 创建测试脚本目录
    mkdir -p scripts
    
    # 设置测试环境变量
    export PYTHONPATH="$PWD:$PYTHONPATH"
    export TEST_MODE="validation"
    
    # 启动必要服务
    echo "启动服务..."
    nix develop .#ai-stack --command bash -c "
      ollama serve &
      redis-server &
      weaviate &
      sleep 10
    "
    
    echo "验证环境准备完成"
    
  run_validation: |
    #!/bin/bash
    echo "运行完整验证..."
    
    # 运行所有验证检查
    total_checks=0
    passed_checks=0
    failed_checks=0
    
    for check in $(yq '.pre_deployment_validation.environment_checks[].id' validation-checklist.yaml); do
      echo "运行检查: $check"
      total_checks=$((total_checks + 1))
      
      # 这里应该实际运行检查逻辑
      # 示例：if run_check($check); then
      #   passed_checks=$((passed_checks + 1))
      # else
      #   failed_checks=$((failed_checks + 1))
      # fi
    done
    
    echo "验证完成:"
    echo "总检查数: $total_checks"
    echo "通过检查: $passed_checks"
    echo "失败检查: $failed_checks"
    
    if [ $failed_checks -eq 0 ]; then
      echo "✅ 所有验证通过!"
      exit 0
    else
      echo "❌ 验证失败，请查看报告"
      exit 1
    fi
    
  generate_report: |
    #!/bin/bash
    echo "生成验证报告..."
    
    # 生成HTML报告
    python3 -c "
    import yaml
    import json
    from datetime import datetime
    
    with open('validation-checklist.yaml', 'r') as f:
        data = yaml.safe_load(f)
    
    report = {
        'timestamp': datetime.now().isoformat(),
        'total_checks': len(data.get('pre_deployment_validation', {}).get('environment_checks', [])),
        'results': []
    }
    
    with open('validation-report.json', 'w') as f:
        json.dump(report, f, indent=2)
    
    print('验证报告已生成: validation-report.json')
    "

# 成功标准
success_criteria:
  critical_checks:
    required_pass_rate: "100%"
    description: "所有关键检查必须通过"
    
  high_priority_checks:
    required_pass_rate: "95%"
    description: "高优先级检查至少95%通过"
    
  overall_checks:
    required_pass_rate: "90%"
    description: "整体检查至少90%通过"
    
  performance_benchmarks:
    api_latency: "<50ms"
    vector_query: "<50ms"
    memory_usage: "<80%"
    cpu_usage: "<85%"
    
  availability_targets:
    uptime: "99.9%"
    error_rate: "<1%"
    response_time: "<100ms"

# 失败处理
failure_handling:
  critical_failure:
    action: "abort_deployment"
    notification: "immediate"
    rollback: "automatic"
    
  high_priority_failure:
    action: "investigate_and_fix"
    notification: "within_1_hour"
    rollback: "manual"
    
  medium_priority_failure:
    action: "create_ticket"
    notification: "within_24_hours"
    rollback: "not_required"
    
  low_priority_failure:
    action: "log_for_next_iteration"
    notification: "weekly_summary"
    rollback: "not_required"

# 报告配置
reporting:
  formats: ["json", "html", "yaml"]
  output_directory: "validation-reports"
  retention_days: 30
  
  sections:
    - "执行摘要"
    - "关键指标"
    - "详细结果"
    - "性能基准"
    - "失败分析"
    - "修复建议"
    - "下次改进"
    
  notifications:
    slack_webhook: "https://hooks.slack.com/services/..."
    email_recipients: ["admin@example.com"]
    
# 持续验证
continuous_validation:
  schedule: "0 */6 * * *"  # 每6小时运行一次
  
  health_checks:
    - "api_endpoints"
    - "model_availability"
    - "vector_engine"
    - "performance_metrics"
    
  automated_remediation:
    enabled: true
    max_attempts: 3
    escalation_threshold: 2
    
  monitoring_integration:
    prometheus: true
    grafana: true
    alertmanager: true