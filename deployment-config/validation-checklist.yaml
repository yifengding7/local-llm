        - path: "frontend/cli/menu.sh"
          type: "file_exists"
          required: true
        - path: "frontend/web/api-docs/"
          type: "directory_exists"
          required: true
      status: "pending"
      
    - id: "ARCH-002"
      category: "architecture"
      priority: "critical"
      name: "API服务层验证"
      description: "验证API服务层完整性"
      checks:
