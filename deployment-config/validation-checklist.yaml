          type: "file_exists"
          required: true
        - path: "core/vector/weaviate_client.py"
          type: "file_exists"
          required: true
        - path: "core/voice/tts_service.py"
          type: "file_exists"
          required: true
      status: "pending"
      
    - id: "ARCH-004"
      category: "architecture"
      priority: "critical"
      name: "极致性能层验证"
      description: "验证极致性能层实现"
      checks:
        - path: "performance/mojo/"
          type: "directory_exists"
          required: true
        - path: "performance/rust/Cargo.toml"
          type: "file_exists"
          required: true
        - path: "performance/go/go.mod"
          type: "file_exists"
          required: true
      status: "pending"
      
    - id: "ARCH-005"
      category: "architecture"
      priority: "high"
      name: "基础设施层验证"
      description: "验证基础设施层组件"
      checks:
        - path: "infrastructure/scaffold/"
          type: "directory_exists"
          required: true
        - path: "infrastructure/logging/"
          type: "directory_exists"
          required: true
        - path: "infrastructure/config/"
          type: "directory_exists"
          required: true
      status: "pending"
      
    - id: "ARCH-006"
      category: "architecture"
      priority: "high"
      name: "MCP集成层验证"
      description: "验证MCP集成层实现"
      checks:
        - path: "mcp/filesystem/"
          type: "directory_exists"
          required: true
        - path: "mcp/github/"
          type: "directory_exists"
          required: true
        - path: "mcp/plugins/"
          type: "directory_exists"
          required: true
      status: "pending"

# 功能验证
functional_validation:
