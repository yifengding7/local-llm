      expected: "HTTP 200 OK"
      timeout: "5s"
      status: "pending"
      
    - id: "FUNC-002"
      category: "functionality"
      priority: "critical"
      name: "聊天端点验证"
      description: "验证聊天API功能"
      command: |
        curl -X POST http://localhost:8000/chat \
          -H "Content-Type: application/json" \
          -d '{"messages": [{"role": "user", "content": "Hello"}], "model": "phi3-mini"}'
      expected: "valid JSON response with message"
      timeout: "30s"
      status: "pending"
      
    - id: "FUNC-003"
      category: "functionality"
      priority: "high"
      name: "代码分析端点"
      description: "验证代码分析功能"
      command: |
        curl -X POST http://localhost:8000/analyze/code \
          -H "Content-Type: application/json" \
          -d '{"code": "def hello(): print(\"hello\")", "language": "python"}'
      expected: "analysis result with suggestions"
      timeout: "60s"
      status: "pending"
      
    - id: "FUNC-004"
      category: "functionality"
      priority: "high"
      name: "代码生成端点"
      description: "验证代码生成功能"
      command: |
        curl -X POST http://localhost:8000/generate/code \
