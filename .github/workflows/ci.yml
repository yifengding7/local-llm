name: CI

on:
  push:
    branches: [ main, feat/** ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pip install poetry==1.8.2
      - name: Install deps
        run: poetry install --with dev
      - name: Lint
        run: poetry run ruff .
      - name: Test
        run: poetry run pytest -q
      - name: Build Docker
        run: docker build -t ai-monitor-ci .
