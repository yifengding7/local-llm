#!/bin/bash
# 快速启动配置文件

# 定义服务组合
declare -A SERVICE_GROUPS

# 基础服务组
SERVICE_GROUPS[basic]="ollama python-core"

# AI监理完整服务组
SERVICE_GROUPS[ai-monitor]="ollama python-core weaviate go-api rust-engine"

# Claude Code服务组
SERVICE_GROUPS[claude-code]="claude-simulator"

# 开发环境组
SERVICE_GROUPS[dev]="ollama python-core weaviate"

# 高性能组
SERVICE_GROUPS[performance]="go-api rust-engine"

# 全部服务
SERVICE_GROUPS[all]="ollama python-core weaviate go-api rust-engine claude-simulator"

# 导出配置
export SERVICE_GROUPS
